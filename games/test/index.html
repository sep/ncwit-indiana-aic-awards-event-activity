<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test — Pirate Seas Platformer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #041428; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }

        #ui {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        #score {
            position: absolute; top: 20px; right: 20px;
            font-size: 2rem; color: #4de8e0;
            font-weight: 700; text-shadow: 0 0 10px #4de8e0;
        }

        #speed-indicator {
            position: absolute; top: 60px; right: 20px;
            font-size: 1rem; color: #ffcc00;
            font-weight: 600; text-shadow: 0 0 8px #ffcc00;
            opacity: 0; transition: opacity 0.3s;
        }
        #speed-indicator.active { opacity: 1; }

        #controls-hint {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem; color: #4a7a8a;
        }

        .screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(4, 20, 40, 0.92);
            z-index: 20; pointer-events: auto;
        }
        .screen h1 {
            font-size: 3.5rem; color: #4de8e0;
            text-shadow: 0 0 20px #4de8e0, 0 0 40px #0a6e6e;
            margin-bottom: 0.5rem;
        }
        .screen .sub {
            font-size: 1.2rem; color: #5a8a9a;
            margin-bottom: 2rem;
        }
        .screen .start-text {
            font-size: 1.3rem; color: #ffcc00;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .screen .final-score {
            font-size: 2rem; color: #4de8e0;
            margin-bottom: 1.5rem;
        }
        .screen button {
            padding: 0.8rem 2.5rem; font-size: 1.1rem;
            border: 2px solid #4de8e0; background: transparent;
            color: #4de8e0; border-radius: 8px; cursor: pointer;
            transition: background 0.2s; pointer-events: auto;
        }
        .screen button:hover { background: rgba(77, 232, 224, 0.15); }

        .credit {
            position: absolute; bottom: 20px;
            font-size: 0.8rem; color: #3a5a6a;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="ui">
    <div id="score">0</div>
    <div id="speed-indicator">⚡ SPEED BOOST!</div>
    <div id="controls-hint">WASD / Arrow Keys to move · SPACE to jump</div>
</div>

<div id="title-screen" class="screen">
    <h1>test</h1>
    <p class="sub">Pirate Seas Platformer</p>
    <p class="start-text">Press SPACE to Start</p>
    <p class="credit">Made by test — NCWIT Indiana AIC Awards</p>
</div>

<div id="gameover-screen" class="screen hidden">
    <h1>YE BE SUNK!</h1>
    <p class="final-score" id="final-score">Score: 0</p>
    <button id="restart-btn">Set Sail Again</button>
    <p class="credit">Made by test — NCWIT Indiana AIC Awards</p>
</div>

<script>
// =============================================================
// CONFIG
// =============================================================
const CONFIG = {
    playerSpeed: 0.12,
    boostedSpeed: 0.22,
    jumpForce: 0.22,
    gravity: 0.008,
    platformCount: 18,
    arenaSize: 16,
    coinSpawnRate: 120,
    maxCoins: 8,
    boostDuration: 300,
    boostSpawnRate: 600,
    playerColor: 0x4de8e0,
    platformColor: 0x1a5c6e,
    coinColor: 0xffcc00,
    boostColor: 0xff6622,
    waterColor: 0x062a40,
    skyColor: 0x041428,
    fogColor: 0x041428,
};

// =============================================================
// THREE.JS SETUP
// =============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(CONFIG.skyColor);
scene.fog = new THREE.Fog(CONFIG.fogColor, 15, 40);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 14, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x2a5a7a, 0.6));
const dirLight = new THREE.DirectionalLight(0xffeedd, 0.9);
dirLight.position.set(8, 12, 6);
dirLight.castShadow = true;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 40;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

const playerGlow = new THREE.PointLight(CONFIG.playerColor, 0.8, 8);
scene.add(playerGlow);

// =============================================================
// WATER PLANE (death zone)
// =============================================================
const waterGeo = new THREE.PlaneGeometry(60, 60, 30, 30);
const waterMat = new THREE.MeshStandardMaterial({
    color: CONFIG.waterColor,
    roughness: 0.3,
    metalness: 0.6,
    transparent: true,
    opacity: 0.85,
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = -2;
scene.add(water);

// =============================================================
// PLATFORMS — scattered across the arena
// =============================================================
const platforms = [];
const platMat = new THREE.MeshStandardMaterial({
    color: CONFIG.platformColor,
    roughness: 0.6,
    metalness: 0.4,
});

function makePlatform(x, y, z, w, d, isStart) {
    const h = 0.5;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = isStart ? new THREE.MeshStandardMaterial({
        color: 0x2a8a7e, roughness: 0.5, metalness: 0.5,
    }) : platMat;
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);

    // Decorative planks / wood texture lines
    const plankGeo = new THREE.BoxGeometry(w * 0.9, 0.05, 0.08);
    const plankMat = new THREE.MeshStandardMaterial({ color: 0x0e3a4a });
    for (let i = -2; i <= 2; i++) {
        const plank = new THREE.Mesh(plankGeo, plankMat);
        plank.position.set(x, y + h / 2 + 0.01, z + i * (d / 5));
        scene.add(plank);
    }

    platforms.push({ mesh, w, d, h, y });
    return mesh;
}

// Starting platform (center, larger)
makePlatform(0, 0, 0, 4, 4, true);

// Generate scattered platforms at varying heights
const rng = (lo, hi) => lo + Math.random() * (hi - lo);
for (let i = 1; i < CONFIG.platformCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 3 + Math.random() * (CONFIG.arenaSize - 3);
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;
    const y = rng(-0.5, 3);
    const w = rng(1.8, 3.5);
    const d = rng(1.8, 3.5);
    makePlatform(x, y, z, w, d, false);
}

// =============================================================
// PLAYER
// =============================================================
const playerGeo = new THREE.Group();

// Body (barrel-like)
const bodyGeo = new THREE.CylinderGeometry(0.35, 0.4, 0.7, 8);
const bodyMat = new THREE.MeshStandardMaterial({
    color: CONFIG.playerColor, emissive: CONFIG.playerColor,
    emissiveIntensity: 0.2, roughness: 0.3, metalness: 0.6,
});
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.35;
playerGeo.add(body);

// Hat (pirate tri-corner simplified)
const hatGeo = new THREE.ConeGeometry(0.4, 0.35, 3);
const hatMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
const hat = new THREE.Mesh(hatGeo, hatMat);
hat.position.y = 0.85;
hat.rotation.y = Math.PI / 6;
playerGeo.add(hat);

// Eyes
const eyeGeo = new THREE.SphereGeometry(0.06, 6, 6);
const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
eyeL.position.set(-0.15, 0.5, 0.32);
playerGeo.add(eyeL);
const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
eyeR.position.set(0.15, 0.5, 0.32);
playerGeo.add(eyeR);

playerGeo.position.set(0, 1, 0);
playerGeo.castShadow = true;
scene.add(playerGeo);

// =============================================================
// COLLECTIBLES
// =============================================================
const coins = [];
const boosts = [];

function spawnCoin() {
    if (coins.length >= CONFIG.maxCoins) return;
    const plat = platforms[Math.floor(Math.random() * platforms.length)];
    const geo = new THREE.TorusGeometry(0.25, 0.08, 8, 16);
    const mat = new THREE.MeshStandardMaterial({
        color: CONFIG.coinColor, emissive: CONFIG.coinColor,
        emissiveIntensity: 0.4, metalness: 0.8, roughness: 0.2,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
        plat.mesh.position.x + rng(-plat.w / 3, plat.w / 3),
        plat.y + plat.h / 2 + 0.5,
        plat.mesh.position.z + rng(-plat.d / 3, plat.d / 3)
    );
    scene.add(mesh);
    coins.push(mesh);
}

function spawnBoost() {
    if (boosts.length >= 2) return;
    const plat = platforms[Math.floor(Math.random() * platforms.length)];
    const geo = new THREE.OctahedronGeometry(0.3);
    const mat = new THREE.MeshStandardMaterial({
        color: CONFIG.boostColor, emissive: CONFIG.boostColor,
        emissiveIntensity: 0.6, metalness: 0.9, roughness: 0.1,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
        plat.mesh.position.x + rng(-plat.w / 4, plat.w / 4),
        plat.y + plat.h / 2 + 0.6,
        plat.mesh.position.z + rng(-plat.d / 4, plat.d / 4)
    );
    scene.add(mesh);
    boosts.push(mesh);
}

// =============================================================
// SCENERY — floating barrels, buoys
// =============================================================
for (let i = 0; i < 12; i++) {
    const bGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.6, 8);
    const bMat = new THREE.MeshStandardMaterial({ color: 0x4a2a10, roughness: 0.9 });
    const barrel = new THREE.Mesh(bGeo, bMat);
    const angle = Math.random() * Math.PI * 2;
    const dist = 8 + Math.random() * 18;
    barrel.position.set(Math.cos(angle) * dist, -1.6 + Math.random() * 0.3, Math.sin(angle) * dist);
    barrel.rotation.z = rng(-0.3, 0.3);
    scene.add(barrel);
}

// =============================================================
// GAME STATE
// =============================================================
let gameState = 'title';
let score = 0;
let frameCount = 0;
let vy = 0; // vertical velocity
let onGround = false;
let currentPlatformY = 0;
let speedBoostTimer = 0;
let particles = [];

const keys = {};
addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.code === 'Space' && gameState === 'title') startGame();
    if (e.code === 'Space' && gameState === 'playing') e.preventDefault();
});
addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('restart-btn').addEventListener('click', startGame);

// =============================================================
// AUDIO
// =============================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, dur, type = 'square') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function playCoinSound() { playSound(880, 0.12, 'sine'); playSound(1100, 0.15, 'sine'); }
function playJumpSound() { playSound(400, 0.15, 'triangle'); }
function playBoostSound() { playSound(600, 0.3, 'sawtooth'); playSound(900, 0.2, 'sine'); }
function playSplashSound() { playSound(100, 0.4, 'sawtooth'); }

// =============================================================
// GAME FUNCTIONS
// =============================================================
function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    score = 0;
    frameCount = 0;
    vy = 0;
    onGround = true;
    currentPlatformY = 0;
    speedBoostTimer = 0;

    playerGeo.position.set(0, 1, 0);

    coins.forEach(c => scene.remove(c));
    coins.length = 0;
    boosts.forEach(b => scene.remove(b));
    boosts.length = 0;
    particles.forEach(p => scene.remove(p));
    particles.length = 0;

    document.getElementById('score').textContent = '0';
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('speed-indicator').classList.remove('active');

    gameState = 'playing';
}

function gameOver() {
    gameState = 'gameover';
    document.getElementById('final-score').textContent = `Score: ${score}`;
    document.getElementById('gameover-screen').classList.remove('hidden');
    spawnExplosion(playerGeo.position.x, playerGeo.position.y, playerGeo.position.z);
    playSplashSound();
}

function spawnExplosion(x, y, z) {
    for (let i = 0; i < 25; i++) {
        const geo = new THREE.SphereGeometry(0.08, 4, 4);
        const mat = new THREE.MeshBasicMaterial({
            color: Math.random() > 0.5 ? 0x4de8e0 : 0x1a7a9e,
            transparent: true, opacity: 1,
        });
        const p = new THREE.Mesh(geo, mat);
        p.position.set(x, y, z);
        p.userData.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.3,
            Math.random() * 0.25,
            (Math.random() - 0.5) * 0.3
        );
        p.userData.life = 1.0;
        scene.add(p);
        particles.push(p);
    }
}

// =============================================================
// COLLISION HELPERS
// =============================================================
function onPlatform(px, py, pz) {
    // py is the player group origin; feet are at ~py, landing height is top + 1
    const prevY = py - vy; // approximate previous Y before gravity was applied
    for (const plat of platforms) {
        const pm = plat.mesh.position;
        const top = plat.y + plat.h / 2;
        const landY = top + 1; // where the player should rest
        const hw = plat.w / 2;
        const hd = plat.d / 2;
        if (
            px > pm.x - hw && px < pm.x + hw &&
            pz > pm.z - hd && pz < pm.z + hd &&
            py <= landY + 0.15 &&
            (prevY >= landY - 0.1 || py >= top - 0.2) &&
            vy <= 0
        ) {
            return top;
        }
    }
    return null;
}

function distXZ(a, b) {
    const dx = a.x - b.x;
    const dz = a.z - b.z;
    return Math.sqrt(dx * dx + dz * dz);
}

// =============================================================
// GAME LOOP
// =============================================================
function animate() {
    requestAnimationFrame(animate);
    const t = Date.now() * 0.001;

    // Water animation
    const verts = waterGeo.attributes.position;
    for (let i = 0; i < verts.count; i++) {
        const x = verts.getX(i);
        const z = verts.getZ(i);
        verts.setY(i, Math.sin(x * 0.5 + t) * 0.15 + Math.cos(z * 0.4 + t * 0.8) * 0.1);
    }
    verts.needsUpdate = true;

    if (gameState === 'playing') {
        frameCount++;

        // Speed
        const isBoosted = speedBoostTimer > 0;
        const speed = isBoosted ? CONFIG.boostedSpeed : CONFIG.playerSpeed;

        if (isBoosted) {
            speedBoostTimer--;
            document.getElementById('speed-indicator').classList.add('active');
            if (speedBoostTimer <= 0) {
                document.getElementById('speed-indicator').classList.remove('active');
            }
        }

        // Movement — full 2D arena (WASD + arrows)
        let dx = 0, dz = 0;
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
        if (keys['ArrowUp'] || keys['w'] || keys['W']) dz -= 1;
        if (keys['ArrowDown'] || keys['s'] || keys['S']) dz += 1;

        // Normalize diagonal movement
        if (dx !== 0 && dz !== 0) {
            dx *= 0.707;
            dz *= 0.707;
        }

        playerGeo.position.x += dx * speed;
        playerGeo.position.z += dz * speed;

        // Face movement direction
        if (dx !== 0 || dz !== 0) {
            const targetAngle = Math.atan2(dx, dz);
            let diff = targetAngle - playerGeo.rotation.y;
            while (diff > Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            playerGeo.rotation.y += diff * 0.15;
        }

        // Jump
        if ((keys[' '] || keys['Space']) && onGround) {
            vy = CONFIG.jumpForce;
            onGround = false;
            playJumpSound();
        }

        // Gravity
        vy -= CONFIG.gravity;
        playerGeo.position.y += vy;

        // Platform collision
        const platY = onPlatform(playerGeo.position.x, playerGeo.position.y, playerGeo.position.z);
        if (platY !== null) {
            playerGeo.position.y = platY + 1;
            vy = 0;
            onGround = true;
            currentPlatformY = platY;
        } else if (playerGeo.position.y <= currentPlatformY + 0.5) {
            onGround = false;
        }

        // Fall into water = death
        if (playerGeo.position.y < -1.5) {
            gameOver();
        }

        // Update light
        playerGlow.position.copy(playerGeo.position);
        playerGlow.position.y += 1;

        // Boost glow
        if (isBoosted) {
            playerGlow.intensity = 1.5 + Math.sin(t * 10) * 0.5;
            playerGlow.color.setHex(CONFIG.boostColor);
        } else {
            playerGlow.intensity = 0.8;
            playerGlow.color.setHex(CONFIG.playerColor);
        }

        // Bobbing hat
        hat.position.y = 0.85 + Math.sin(t * 3) * 0.03;

        // Spawn coins & boosts
        if (frameCount % CONFIG.coinSpawnRate === 0) spawnCoin();
        if (frameCount % CONFIG.boostSpawnRate === 0) spawnBoost();

        // Animate & collect coins
        for (let i = coins.length - 1; i >= 0; i--) {
            const c = coins[i];
            c.rotation.y += 0.04;
            c.position.y += Math.sin(t * 3 + i) * 0.003;

            if (distXZ(playerGeo.position, c.position) < 0.7 &&
                Math.abs(playerGeo.position.y - c.position.y) < 1.2) {
                scene.remove(c);
                coins.splice(i, 1);
                score += 10;
                document.getElementById('score').textContent = score;
                playCoinSound();
            }
        }

        // Animate & collect boosts
        for (let i = boosts.length - 1; i >= 0; i--) {
            const b = boosts[i];
            b.rotation.y += 0.06;
            b.rotation.x += 0.03;
            b.position.y += Math.sin(t * 4 + i) * 0.004;

            if (distXZ(playerGeo.position, b.position) < 0.7 &&
                Math.abs(playerGeo.position.y - b.position.y) < 1.2) {
                scene.remove(b);
                boosts.splice(i, 1);
                speedBoostTimer = CONFIG.boostDuration;
                playBoostSound();
                score += 25;
                document.getElementById('score').textContent = score;
            }
        }

        // Camera follows player (top-down angled)
        const camTarget = new THREE.Vector3(
            playerGeo.position.x * 0.6,
            14,
            playerGeo.position.z * 0.6 + 10
        );
        camera.position.lerp(camTarget, 0.05);
        camera.lookAt(playerGeo.position.x * 0.5, 0, playerGeo.position.z * 0.5);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.position.add(p.userData.velocity);
        p.userData.velocity.y -= 0.005;
        p.userData.life -= 0.02;
        p.material.opacity = Math.max(0, p.userData.life);
        if (p.userData.life <= 0) {
            scene.remove(p);
            particles.splice(i, 1);
        }
    }

    // Coin rotation on title
    coins.forEach(c => { c.rotation.y += 0.02; });

    // Title camera sway
    if (gameState === 'title') {
        camera.position.x = Math.sin(t * 0.5) * 2;
        camera.position.z = 14 + Math.cos(t * 0.3) * 2;
        camera.lookAt(0, 0, 0);
    }

    renderer.render(scene, camera);
}

animate();

// Resize
addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
