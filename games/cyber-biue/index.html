<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Blue — Platformer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }

        #ui {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        #score {
            position: absolute; top: 20px; right: 20px;
            font-size: 2rem; color: #0ff; font-weight: 700;
            text-shadow: 0 0 10px #0ff;
        }

        #event-banner {
            position: absolute; top: 70px; left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem; color: #f0f;
            text-shadow: 0 0 10px #f0f;
            opacity: 0; transition: opacity 0.3s;
            white-space: nowrap;
        }
        #event-banner.visible { opacity: 1; }

        #controls-hint {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem; color: #666;
        }

        .screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(10, 10, 26, 0.92); z-index: 20;
            pointer-events: auto;
        }

        .screen h1 {
            font-size: 3.5rem; color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
            margin-bottom: 0.5rem;
        }

        .screen .sub { font-size: 1.2rem; color: #888; margin-bottom: 2rem; }

        .screen .start-text {
            font-size: 1.3rem; color: #f0f;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .screen .final-score {
            font-size: 2rem; color: #0ff; margin-bottom: 1.5rem;
        }

        .screen button {
            padding: 0.8rem 2.5rem; font-size: 1.1rem;
            border: 2px solid #0ff; background: transparent;
            color: #0ff; border-radius: 8px; cursor: pointer;
            transition: background 0.2s; pointer-events: auto;
        }
        .screen button:hover { background: rgba(0,255,255,0.15); }

        .credit {
            position: absolute; bottom: 20px;
            font-size: 0.8rem; color: #555;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="ui">
    <div id="score">0</div>
    <div id="event-banner"></div>
    <div id="controls-hint">← → to move · SPACE to jump</div>
</div>

<div id="title-screen" class="screen">
    <h1>CYBER BLUE</h1>
    <p class="sub">Cyberpunk Platformer</p>
    <p class="start-text">Press SPACE to Start</p>
    <p class="credit">Made by cyber biue — NCWIT Indiana AIC Awards</p>
</div>

<div id="gameover-screen" class="screen hidden">
    <h1>GAME OVER</h1>
    <p class="final-score" id="final-score">Score: 0</p>
    <button id="restart-btn">Play Again</button>
    <p class="credit">Made by cyber biue — NCWIT Indiana AIC Awards</p>
</div>

<script>
// =============================================================
// CONFIGURATION
// =============================================================
const CONFIG = {
    playerSpeed: 0.12,
    jumpForce: 0.22,
    gravity: 0.008,
    platformSpeed: 0.04,
    spawnRate: 90,
    speedIncrease: 0.00003,
    playerColor: 0x00ffff,
    platformColor: 0xff00ff,
    coinColor: 0xffff00,
    bgColor: 0x0a0a1a,
    floorColor: 0x111133,
};

// =============================================================
// THREE.JS SETUP
// =============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(CONFIG.bgColor);
scene.fog = new THREE.Fog(CONFIG.bgColor, 15, 40);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 6, 12);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x404060, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

const playerLight = new THREE.PointLight(CONFIG.playerColor, 1, 15);
playerLight.position.set(0, 3, 0);
scene.add(playerLight);

// Cyberpunk city background buildings
function createBuildings() {
    const buildingGroup = new THREE.Group();
    for (let i = 0; i < 40; i++) {
        const w = 0.5 + Math.random() * 1.5;
        const h = 2 + Math.random() * 8;
        const d = 0.5 + Math.random() * 1.5;
        const geo = new THREE.BoxGeometry(w, h, d);
        const hue = Math.random() > 0.5 ? 0x0a0a2a : 0x0f0f25;
        const mat = new THREE.MeshStandardMaterial({ color: hue, roughness: 0.9, metalness: 0.1 });
        const bldg = new THREE.Mesh(geo, mat);
        bldg.position.set((Math.random() - 0.5) * 30, h / 2 - 1, -5 - Math.random() * 20);
        buildingGroup.add(bldg);

        // Neon window strips
        if (Math.random() > 0.4) {
            const stripGeo = new THREE.BoxGeometry(w * 0.8, 0.1, d + 0.01);
            const neonColor = [0x00ffff, 0xff00ff, 0xff0066][Math.floor(Math.random() * 3)];
            const stripMat = new THREE.MeshBasicMaterial({ color: neonColor });
            for (let s = 0; s < 3; s++) {
                const strip = new THREE.Mesh(stripGeo, stripMat);
                strip.position.set(bldg.position.x, 1 + s * (h / 4), bldg.position.z);
                buildingGroup.add(strip);
            }
        }
    }
    scene.add(buildingGroup);
}
createBuildings();

// Floor / ground
const floorGeo = new THREE.PlaneGeometry(30, 50);
const floorMat = new THREE.MeshStandardMaterial({ color: CONFIG.floorColor, roughness: 0.8, metalness: 0.2 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.5;
scene.add(floor);

const grid = new THREE.GridHelper(30, 30, 0x222255, 0x222255);
grid.position.y = -0.49;
scene.add(grid);

// Player
const playerGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
const playerMat = new THREE.MeshStandardMaterial({
    color: CONFIG.playerColor, emissive: CONFIG.playerColor,
    emissiveIntensity: 0.3, roughness: 0.3, metalness: 0.7
});
const player = new THREE.Mesh(playerGeo, playerMat);
player.position.set(0, 0.35, 4);
scene.add(player);

// =============================================================
// GAME STATE
// =============================================================
let gameState = 'title';
let score = 0;
let frameCount = 0;
let currentSpeed = CONFIG.platformSpeed;
let playerVelY = 0;
let isGrounded = true;
let platforms = [];
let coins = [];
let particles = [];
let activeEvent = null;
let eventTimer = 0;
let eventBannerTimer = 0;

const keys = {};
addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.code === 'Space' && gameState === 'title') startGame();
    if (e.code === 'Space' && gameState === 'playing' && isGrounded) {
        playerVelY = CONFIG.jumpForce;
        isGrounded = false;
        playSound(500, 0.15, 'sine');
    }
});
addEventListener('keyup', (e) => { keys[e.key] = false; });
document.getElementById('restart-btn').addEventListener('click', startGame);

// =============================================================
// RANDOM EVENTS
// =============================================================
const EVENTS = [
    { name: 'SPEED SURGE', duration: 300, color: '#f00',
      apply: () => { currentSpeed *= 2; },
      revert: () => { currentSpeed /= 2; } },
    { name: 'LOW GRAVITY', duration: 360, color: '#0f0',
      apply: () => { CONFIG._origGravity = CONFIG.gravity; CONFIG.gravity *= 0.4; CONFIG._origJump = CONFIG.jumpForce; CONFIG.jumpForce = 0.28; },
      revert: () => { CONFIG.gravity = CONFIG._origGravity; CONFIG.jumpForce = CONFIG._origJump; } },
    { name: 'COIN FRENZY', duration: 300, color: '#ff0',
      apply: () => {},
      revert: () => {} },
    { name: 'GIANT PLAYER', duration: 300, color: '#f0f',
      apply: () => { player.scale.set(1.5, 1.5, 1.5); },
      revert: () => { player.scale.set(1, 1, 1); } },
    { name: 'TINY PLATFORMS', duration: 240, color: '#f80',
      apply: () => {},
      revert: () => {} },
    { name: 'NEON RAIN', duration: 300, color: '#0ff',
      apply: () => {},
      revert: () => {} },
];

function triggerRandomEvent() {
    if (activeEvent) activeEvent.revert();
    const ev = EVENTS[Math.floor(Math.random() * EVENTS.length)];
    activeEvent = { ...ev };
    eventTimer = ev.duration;
    ev.apply();
    showEventBanner(`⚡ ${ev.name} ⚡`, ev.color);
    playSound(300, 0.3, 'sawtooth');
}

function showEventBanner(text, color) {
    const banner = document.getElementById('event-banner');
    banner.textContent = text;
    banner.style.color = color;
    banner.style.textShadow = `0 0 10px ${color}`;
    banner.classList.add('visible');
    eventBannerTimer = 120;
}

// =============================================================
// GAME FUNCTIONS
// =============================================================
function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    score = 0; frameCount = 0;
    currentSpeed = CONFIG.platformSpeed;
    playerVelY = 0; isGrounded = true;
    player.position.set(0, 0.35, 4);
    player.scale.set(1, 1, 1);
    CONFIG.gravity = 0.008;
    CONFIG.jumpForce = 0.22;

    platforms.forEach(p => scene.remove(p));
    platforms = [];
    coins.forEach(c => scene.remove(c));
    coins = [];
    particles.forEach(p => scene.remove(p));
    particles = [];

    if (activeEvent) { activeEvent = null; }
    eventTimer = 0;

    document.getElementById('score').textContent = '0';
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('event-banner').classList.remove('visible');

    // Spawn initial platforms
    for (let i = 0; i < 6; i++) {
        spawnPlatform(-2 + i * 3);
    }

    gameState = 'playing';
}

function gameOver() {
    gameState = 'gameover';
    if (activeEvent) { activeEvent.revert(); activeEvent = null; }
    document.getElementById('final-score').textContent = `Score: ${score}`;
    document.getElementById('gameover-screen').classList.remove('hidden');
    spawnExplosion(player.position.x, player.position.y, player.position.z);
    playSound(150, 0.4, 'sawtooth');
}

function spawnPlatform(z) {
    const isTiny = activeEvent && activeEvent.name === 'TINY PLATFORMS';
    const w = isTiny ? 1.0 + Math.random() * 0.8 : 1.5 + Math.random() * 2.5;
    const geo = new THREE.BoxGeometry(w, 0.3, 1);
    const mat = new THREE.MeshStandardMaterial({
        color: CONFIG.platformColor,
        emissive: CONFIG.platformColor,
        emissiveIntensity: 0.15,
        roughness: 0.5, metalness: 0.5
    });
    const plat = new THREE.Mesh(geo, mat);
    plat.position.set((Math.random() - 0.5) * 6, -0.35 + Math.random() * 3, z || -12);
    plat.userData.width = w;
    scene.add(plat);
    platforms.push(plat);

    // Sometimes spawn a coin above the platform
    const coinChance = (activeEvent && activeEvent.name === 'COIN FRENZY') ? 0.9 : 0.4;
    if (Math.random() < coinChance) {
        spawnCoin(plat.position.x, plat.position.y + 1.2, plat.position.z);
    }
}

function spawnCoin(x, y, z) {
    const geo = new THREE.OctahedronGeometry(0.25, 0);
    const mat = new THREE.MeshStandardMaterial({
        color: CONFIG.coinColor, emissive: CONFIG.coinColor,
        emissiveIntensity: 0.4, roughness: 0.2, metalness: 0.8
    });
    const coin = new THREE.Mesh(geo, mat);
    coin.position.set(x, y, z);
    scene.add(coin);
    coins.push(coin);
}

function spawnExplosion(x, y, z) {
    for (let i = 0; i < 25; i++) {
        const geo = new THREE.BoxGeometry(0.12, 0.12, 0.12);
        const mat = new THREE.MeshBasicMaterial({
            color: CONFIG.playerColor, transparent: true, opacity: 1
        });
        const p = new THREE.Mesh(geo, mat);
        p.position.set(x, y, z);
        p.userData.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.3,
            Math.random() * 0.25,
            (Math.random() - 0.5) * 0.3
        );
        p.userData.life = 1.0;
        scene.add(p);
        particles.push(p);
    }
}

function spawnNeonRainDrop() {
    const geo = new THREE.BoxGeometry(0.05, 0.3, 0.05);
    const colors = [0x00ffff, 0xff00ff, 0xff0066, 0x00ff66];
    const mat = new THREE.MeshBasicMaterial({
        color: colors[Math.floor(Math.random() * colors.length)],
        transparent: true, opacity: 0.7
    });
    const drop = new THREE.Mesh(geo, mat);
    drop.position.set((Math.random() - 0.5) * 16, 10, (Math.random() - 0.5) * 16);
    drop.userData.velocity = new THREE.Vector3(0, -0.2, 0);
    drop.userData.life = 1.0;
    scene.add(drop);
    particles.push(drop);
}

function checkBoxCollision(a, b, threshX, threshY, threshZ) {
    return Math.abs(a.position.x - b.position.x) < threshX &&
           Math.abs(a.position.y - b.position.y) < threshY &&
           Math.abs(a.position.z - b.position.z) < threshZ;
}

// =============================================================
// AUDIO
// =============================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration, type = 'square') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

// =============================================================
// GAME LOOP
// =============================================================
function animate() {
    requestAnimationFrame(animate);

    if (gameState === 'playing') {
        frameCount++;

        // Player horizontal movement
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.position.x -= CONFIG.playerSpeed;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) player.position.x += CONFIG.playerSpeed;
        player.position.x = Math.max(-5, Math.min(5, player.position.x));

        // Gravity & jump
        playerVelY -= CONFIG.gravity;
        player.position.y += playerVelY;

        // Ground collision
        if (player.position.y <= 0.35) {
            player.position.y = 0.35;
            playerVelY = 0;
            isGrounded = true;
        }

        // Platform collision (land on top)
        let onPlatform = false;
        for (const plat of platforms) {
            const hw = plat.userData.width / 2 + 0.3;
            if (player.position.x > plat.position.x - hw &&
                player.position.x < plat.position.x + hw &&
                player.position.z > plat.position.z - 0.7 &&
                player.position.z < plat.position.z + 0.7 &&
                player.position.y >= plat.position.y + 0.15 &&
                player.position.y <= plat.position.y + 0.6 &&
                playerVelY <= 0) {
                player.position.y = plat.position.y + 0.5;
                playerVelY = 0;
                isGrounded = true;
                onPlatform = true;
            }
        }

        // Fall off screen = game over
        if (player.position.y < -3) {
            gameOver();
            return;
        }

        // Player rotation flair
        player.rotation.y += 0.02;
        playerLight.position.set(player.position.x, player.position.y + 2, player.position.z);

        // Move platforms toward camera
        currentSpeed += CONFIG.speedIncrease;
        for (let i = platforms.length - 1; i >= 0; i--) {
            platforms[i].position.z += currentSpeed;
            if (platforms[i].position.z > 10) {
                scene.remove(platforms[i]);
                platforms.splice(i, 1);
                score++;
                document.getElementById('score').textContent = score;
                if (score % 5 === 0) playSound(800, 0.1, 'sine');
            }
        }

        // Spawn new platforms
        if (frameCount % CONFIG.spawnRate === 0) {
            spawnPlatform();
        }

        // Coin collection
        for (let i = coins.length - 1; i >= 0; i--) {
            const c = coins[i];
            c.position.z += currentSpeed;
            c.rotation.y += 0.05;
            c.rotation.x += 0.03;

            if (checkBoxCollision(player, c, 0.6, 0.8, 0.6)) {
                scene.remove(c);
                coins.splice(i, 1);
                score += 5;
                document.getElementById('score').textContent = score;
                playSound(1000, 0.12, 'sine');
                // Mini sparkle
                for (let s = 0; s < 5; s++) {
                    const geo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
                    const mat = new THREE.MeshBasicMaterial({ color: CONFIG.coinColor, transparent: true, opacity: 1 });
                    const sp = new THREE.Mesh(geo, mat);
                    sp.position.copy(c.position);
                    sp.userData.velocity = new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.15, (Math.random()-0.5)*0.2);
                    sp.userData.life = 0.6;
                    scene.add(sp);
                    particles.push(sp);
                }
                continue;
            }

            if (c.position.z > 10) {
                scene.remove(c);
                coins.splice(i, 1);
            }
        }

        // Random events every ~500 frames
        if (frameCount % 500 === 0 && frameCount > 100) {
            triggerRandomEvent();
        }

        // Event timer
        if (eventTimer > 0) {
            eventTimer--;
            if (eventTimer <= 0 && activeEvent) {
                activeEvent.revert();
                activeEvent = null;
            }
        }

        // Event banner fade
        if (eventBannerTimer > 0) {
            eventBannerTimer--;
            if (eventBannerTimer <= 0) {
                document.getElementById('event-banner').classList.remove('visible');
            }
        }

        // Neon rain effect
        if (activeEvent && activeEvent.name === 'NEON RAIN' && frameCount % 3 === 0) {
            spawnNeonRainDrop();
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.position.add(p.userData.velocity);
        p.userData.velocity.y -= 0.004;
        p.userData.life -= 0.015;
        p.material.opacity = Math.max(0, p.userData.life);
        if (p.userData.life <= 0) {
            scene.remove(p);
            particles.splice(i, 1);
        }
    }

    // Camera
    if (gameState === 'title') {
        camera.position.x = Math.sin(Date.now() * 0.001) * 0.5;
    } else {
        camera.position.x = THREE.MathUtils.lerp(camera.position.x, player.position.x * 0.3, 0.05);
        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 4 + player.position.y * 0.3, 0.05);
    }

    renderer.render(scene, camera);
}

// Resize
addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
