<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Asteroid Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }

        /* --- UI Overlay --- */
        #ui {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #score {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 2rem;
            color: #0ff;
            font-weight: 700;
            text-shadow: 0 0 10px #0ff;
        }

        #freeze-bar {
            position: absolute;
            top: 20px; left: 20px;
            width: 150px;
            height: 16px;
            border: 2px solid #0ff;
            border-radius: 8px;
            overflow: hidden;
        }

        #freeze-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #0ff, #f0f);
            transition: width 0.2s;
        }

        #freeze-label {
            position: absolute;
            top: 42px; left: 20px;
            font-size: 0.75rem;
            color: #888;
        }

        #controls-hint {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: #666;
        }

        /* --- Title & Game Over Screens --- */
        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 26, 0.9);
            z-index: 20;
            pointer-events: auto;
        }

        .screen h1 {
            font-size: 3.5rem;
            color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
            margin-bottom: 0.5rem;
        }

        .screen .sub {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .screen .start-text {
            font-size: 1.3rem;
            color: #f0f;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .screen .final-score {
            font-size: 2rem;
            color: #0ff;
            margin-bottom: 1.5rem;
        }

        .screen button {
            padding: 0.8rem 2.5rem;
            font-size: 1.1rem;
            border: 2px solid #0ff;
            background: transparent;
            color: #0ff;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            pointer-events: auto;
        }
        .screen button:hover {
            background: rgba(0, 255, 255, 0.1);
        }

        .credit {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #555;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .hidden { display: none !important; }

        #freeze-flash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 255, 255, 0.15);
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #freeze-flash.active {
            opacity: 1;
        }
    </style>
</head>
<body>

<!-- UI Overlay -->
<div id="ui">
    <div id="score">0</div>
    <div id="freeze-bar"><div id="freeze-fill"></div></div>
    <div id="freeze-label">FREEZE [F]</div>
    <div id="controls-hint">← → ↑ ↓ to fly &bull; SPACE to shoot &bull; F to freeze time</div>
</div>

<!-- Freeze Flash Effect -->
<div id="freeze-flash"></div>

<!-- Title Screen -->
<div id="title-screen" class="screen">
    <h1>MY ASTEROID GAME</h1>
    <p class="sub">Navigate the asteroid field &bull; Freeze time to survive!</p>
    <p class="start-text">Click to Start</p>
    <p class="credit">By Kelly — NCWIT Indiana AIC Awards</p>
</div>

<!-- Game Over Screen -->
<div id="gameover-screen" class="screen hidden">
    <h1>GAME OVER</h1>
    <p class="final-score" id="final-score">Score: 0</p>
    <button id="restart-btn">Play Again</button>
    <p class="credit">By Kelly — NCWIT Indiana AIC Awards</p>
</div>

<script>
// =============================================================
// GAME CONFIGURATION
// =============================================================
const CONFIG = {
    playerSpeed: 0.12,
    asteroidSpeed: 0.08,
    spawnRate: 35,
    speedIncrease: 0.00004,
    playerColor: 0x00ffff,
    asteroidColor: 0xff00ff,
    bgColor: 0x050510,
    freezeDuration: 120,     // frames freeze lasts
    freezeCooldown: 300,     // frames to recharge
};

// =============================================================
// THREE.JS SETUP
// =============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(CONFIG.bgColor);
scene.fog = new THREE.Fog(CONFIG.bgColor, 15, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x303050, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.7);
directionalLight.position.set(5, 10, 5);
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0x00ffff, 1.5, 20);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// Purple accent light
const purpleLight = new THREE.PointLight(0xff00ff, 0.8, 25);
purpleLight.position.set(-5, 3, -5);
scene.add(purpleLight);

// --- Starfield background (instanced small spheres) ---
const starCount = 2000;
const starGeometry = new THREE.SphereGeometry(0.03, 4, 4);
const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
const stars = new THREE.InstancedMesh(starGeometry, starMaterial, starCount);
const dummy = new THREE.Object3D();
for (let i = 0; i < starCount; i++) {
    dummy.position.set(
        (Math.random() - 0.5) * 120,
        (Math.random() - 0.5) * 80,
        (Math.random() - 0.5) * 120
    );
    dummy.updateMatrix();
    stars.setMatrixAt(i, dummy.matrix);
}
scene.add(stars);

// --- Player Ship ---
const shipGroup = new THREE.Group();

// Main body
const bodyGeom = new THREE.ConeGeometry(0.4, 1.5, 4);
const bodyMat = new THREE.MeshStandardMaterial({
    color: CONFIG.playerColor,
    emissive: CONFIG.playerColor,
    emissiveIntensity: 0.4,
    roughness: 0.2,
    metalness: 0.8
});
const body = new THREE.Mesh(bodyGeom, bodyMat);
body.rotation.x = Math.PI / 2;
shipGroup.add(body);

// Wings
const wingGeom = new THREE.BoxGeometry(2, 0.1, 0.6);
const wingMat = new THREE.MeshStandardMaterial({
    color: 0x0088aa,
    emissive: 0x004466,
    emissiveIntensity: 0.3,
    metalness: 0.9,
    roughness: 0.3
});
const wings = new THREE.Mesh(wingGeom, wingMat);
wings.position.z = 0.3;
shipGroup.add(wings);

// Engine glow
const engineGeom = new THREE.SphereGeometry(0.2, 8, 8);
const engineMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
const engine = new THREE.Mesh(engineGeom, engineMat);
engine.position.z = 0.8;
shipGroup.add(engine);

shipGroup.position.set(0, 0, 5);
scene.add(shipGroup);

// =============================================================
// GAME STATE
// =============================================================
let gameState = 'title';
let score = 0;
let frameCount = 0;
let currentAsteroidSpeed = CONFIG.asteroidSpeed;
let asteroids = [];
let particles = [];

// Freeze Time state
let freezeActive = false;
let freezeTimer = 0;
let freezeCharge = CONFIG.freezeCooldown; // starts fully charged
let freezeCooldownTimer = 0;
let bullets = [];
let shootCooldown = 0;
const SHOOT_RATE = 10; // frames between shots

// --- Input ---
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.key] = true;

    // Freeze Time activation
    if ((e.key === 'f' || e.key === 'F') && gameState === 'playing' && !freezeActive && freezeCharge >= CONFIG.freezeCooldown) {
        activateFreeze();
    }
});

// Start game on click (frees SPACE for shooting)
document.getElementById('title-screen').addEventListener('click', startGame);
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

document.getElementById('restart-btn').addEventListener('click', startGame);

// =============================================================
// GAME FUNCTIONS
// =============================================================

function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();

    score = 0;
    frameCount = 0;
    currentAsteroidSpeed = CONFIG.asteroidSpeed;
    shipGroup.position.set(0, 0, 5);
    freezeActive = false;
    freezeTimer = 0;
    freezeCharge = CONFIG.freezeCooldown;
    freezeCooldownTimer = 0;

    asteroids.forEach(a => scene.remove(a));
    asteroids = [];
    bullets.forEach(b => scene.remove(b));
    bullets = [];
    particles.forEach(p => scene.remove(p));
    particles = [];
    shootCooldown = 0;

    document.getElementById('score').textContent = '0';
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.add('hidden');
    document.getElementById('freeze-fill').style.width = '100%';
    document.getElementById('freeze-flash').classList.remove('active');

    gameState = 'playing';
}

function gameOver() {
    gameState = 'gameover';
    document.getElementById('final-score').textContent = `Score: ${score}`;
    document.getElementById('gameover-screen').classList.remove('hidden');
    spawnExplosion(shipGroup.position.x, shipGroup.position.y, shipGroup.position.z);
    playHitSound();
}

function activateFreeze() {
    freezeActive = true;
    freezeTimer = CONFIG.freezeDuration;
    freezeCharge = 0;
    document.getElementById('freeze-flash').classList.add('active');
    playFreezeSound();
}

// --- Asteroid spawning ---
function spawnAsteroid() {
    const size = 0.3 + Math.random() * 0.6;
    const geometry = new THREE.DodecahedronGeometry(size, 0);
    const hue = Math.random() > 0.5 ? 0xff00ff : 0xaa00ff;
    const material = new THREE.MeshStandardMaterial({
        color: hue,
        emissive: hue,
        emissiveIntensity: 0.15,
        roughness: 0.7,
        metalness: 0.3,
        flatShading: true
    });
    const asteroid = new THREE.Mesh(geometry, material);

    // Pick a random direction to spawn from
    const direction = Math.random();
    let vx = 0, vy = 0, vz = 0;

    if (direction < 0.45) {
        // From the front (most common)
        asteroid.position.set(
            (Math.random() - 0.5) * 12,
            (Math.random() - 0.5) * 2,
            -20 - Math.random() * 10
        );
        vx = (Math.random() - 0.5) * 0.02;
        vz = 1;
    } else if (direction < 0.65) {
        // From the left
        asteroid.position.set(
            -14 - Math.random() * 5,
            (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 10
        );
        vx = 1;
        vz = (Math.random() - 0.5) * 0.3;
    } else if (direction < 0.85) {
        // From the right
        asteroid.position.set(
            14 + Math.random() * 5,
            (Math.random() - 0.5) * 2,
            (Math.random() - 0.5) * 10
        );
        vx = -1;
        vz = (Math.random() - 0.5) * 0.3;
    } else {
        // From above
        asteroid.position.set(
            (Math.random() - 0.5) * 10,
            10 + Math.random() * 5,
            -5 + (Math.random() - 0.5) * 10
        );
        vx = (Math.random() - 0.5) * 0.2;
        vy = -1;
        vz = (Math.random() - 0.5) * 0.3;
    }

    // Normalize and store velocity
    const vel = new THREE.Vector3(vx, vy, vz).normalize();
    asteroid.userData.velocity = vel;
    asteroid.userData.rotSpeed = {
        x: (Math.random() - 0.5) * 0.05,
        y: (Math.random() - 0.5) * 0.05,
        z: (Math.random() - 0.5) * 0.05
    };
    asteroid.userData.size = size;

    scene.add(asteroid);
    asteroids.push(asteroid);
}

// --- Particle explosion ---
function spawnExplosion(x, y, z) {
    for (let i = 0; i < 30; i++) {
        const geometry = new THREE.TetrahedronGeometry(0.1);
        const color = Math.random() > 0.5 ? 0x00ffff : 0xff00ff;
        const material = new THREE.MeshBasicMaterial({
            color: color,
            transparent: true,
            opacity: 1
        });
        const particle = new THREE.Mesh(geometry, material);
        particle.position.set(x, y, z);
        particle.userData.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.4,
            (Math.random() - 0.5) * 0.4,
            (Math.random() - 0.5) * 0.4
        );
        particle.userData.life = 1.0;
        scene.add(particle);
        particles.push(particle);
    }
}

// --- Shoot bullet ---
function shootBullet() {
    const geometry = new THREE.CylinderGeometry(0.05, 0.05, 0.6, 6);
    const material = new THREE.MeshBasicMaterial({ color: 0x00ffff });
    const bullet = new THREE.Mesh(geometry, material);
    bullet.rotation.x = Math.PI / 2;
    bullet.position.set(shipGroup.position.x, shipGroup.position.y, shipGroup.position.z - 1);
    scene.add(bullet);
    bullets.push(bullet);
    playShootSound();
}

// --- Collision detection ---
function checkCollision(ship, asteroid) {
    const dx = ship.position.x - asteroid.position.x;
    const dy = ship.position.y - asteroid.position.y;
    const dz = ship.position.z - asteroid.position.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    return dist < (asteroid.userData.size + 0.5);
}

function checkBulletHit(bullet, asteroid) {
    const dx = bullet.position.x - asteroid.position.x;
    const dy = bullet.position.y - asteroid.position.y;
    const dz = bullet.position.z - asteroid.position.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    return dist < (asteroid.userData.size + 0.2);
}

// =============================================================
// WEB AUDIO
// =============================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, duration, type = 'square') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playHitSound() { playSound(150, 0.4, 'sawtooth'); }
function playScoreSound() { playSound(900, 0.08, 'sine'); }
function playShootSound() { playSound(1400, 0.06, 'square'); }
function playExplodeSound() { playSound(200, 0.25, 'sawtooth'); }
function playFreezeSound() {
    playSound(1200, 0.3, 'sine');
    setTimeout(() => playSound(1600, 0.2, 'sine'), 100);
}

// =============================================================
// GAME LOOP
// =============================================================
function animate() {
    requestAnimationFrame(animate);

    if (gameState === 'playing') {
        frameCount++;

        // --- Player movement ---
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
            shipGroup.position.x -= CONFIG.playerSpeed;
            shipGroup.rotation.z = THREE.MathUtils.lerp(shipGroup.rotation.z, 0.3, 0.1);
        } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
            shipGroup.position.x += CONFIG.playerSpeed;
            shipGroup.rotation.z = THREE.MathUtils.lerp(shipGroup.rotation.z, -0.3, 0.1);
        } else {
            shipGroup.rotation.z = THREE.MathUtils.lerp(shipGroup.rotation.z, 0, 0.1);
        }

        if (keys['ArrowUp'] || keys['w'] || keys['W']) {
            shipGroup.position.z -= CONFIG.playerSpeed * 0.8;
        }
        if (keys['ArrowDown'] || keys['s'] || keys['S']) {
            shipGroup.position.z += CONFIG.playerSpeed * 0.8;
        }

        // Shooting
        if (keys[' '] && shootCooldown <= 0) {
            shootBullet();
            shootCooldown = SHOOT_RATE;
        }
        if (shootCooldown > 0) shootCooldown--;

        // Clamp player
        shipGroup.position.x = Math.max(-5.5, Math.min(5.5, shipGroup.position.x));
        shipGroup.position.z = Math.max(-2, Math.min(7, shipGroup.position.z));

        // Update lights to follow player
        pointLight.position.x = shipGroup.position.x;
        pointLight.position.z = shipGroup.position.z;

        // Engine pulse
        engine.material.color.setHSL((frameCount * 0.01) % 1, 1, 0.5);

        // --- Freeze Time logic ---
        if (freezeActive) {
            freezeTimer--;
            if (freezeTimer <= 0) {
                freezeActive = false;
                document.getElementById('freeze-flash').classList.remove('active');
            }
        } else {
            // Recharge
            if (freezeCharge < CONFIG.freezeCooldown) {
                freezeCharge++;
                document.getElementById('freeze-fill').style.width = (freezeCharge / CONFIG.freezeCooldown * 100) + '%';
            }
        }

        // --- Spawn asteroids ---
        if (frameCount % CONFIG.spawnRate === 0) {
            spawnAsteroid();
        }

        // --- Move asteroids ---
        currentAsteroidSpeed += CONFIG.speedIncrease;
        const speedMultiplier = freezeActive ? 0.1 : 1; // slow to 10% when frozen

        // --- Move bullets ---
        for (let i = bullets.length - 1; i >= 0; i--) {
            const b = bullets[i];
            b.position.z -= 0.5;
            if (b.position.z < -30) {
                scene.remove(b);
                bullets.splice(i, 1);
            }
        }

        for (let i = asteroids.length - 1; i >= 0; i--) {
            const ast = asteroids[i];
            const speed = (currentAsteroidSpeed + currentAsteroidSpeed * frameCount * 0.00008) * speedMultiplier;
            ast.position.x += ast.userData.velocity.x * speed;
            ast.position.y += ast.userData.velocity.y * speed;
            ast.position.z += ast.userData.velocity.z * speed;

            // Rotate asteroids (also slowed during freeze)
            ast.rotation.x += ast.userData.rotSpeed.x * speedMultiplier;
            ast.rotation.y += ast.userData.rotSpeed.y * speedMultiplier;
            ast.rotation.z += ast.userData.rotSpeed.z * speedMultiplier;

            // Check bullet hits
            let destroyed = false;
            for (let j = bullets.length - 1; j >= 0; j--) {
                if (checkBulletHit(bullets[j], ast)) {
                    // Destroy asteroid
                    spawnExplosion(ast.position.x, ast.position.y, ast.position.z);
                    playExplodeSound();
                    scene.remove(ast);
                    asteroids.splice(i, 1);
                    scene.remove(bullets[j]);
                    bullets.splice(j, 1);
                    score += 3;
                    document.getElementById('score').textContent = score;
                    if (score % 10 === 0) playScoreSound();
                    destroyed = true;
                    break;
                }
            }
            if (destroyed) continue;

            // Check collision with ship
            if (checkCollision(shipGroup, ast)) {
                gameOver();
                return;
            }

            // Remove if far off screen
            if (ast.position.z > 12 || ast.position.x > 18 || ast.position.x < -18 || ast.position.y < -10) {
                scene.remove(ast);
                asteroids.splice(i, 1);
                score++;
                document.getElementById('score').textContent = score;
                if (score % 10 === 0) playScoreSound();
            }
        }
    }

    // --- Update particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.position.add(p.userData.velocity);
        p.userData.velocity.y -= 0.003;
        p.userData.life -= 0.015;
        p.material.opacity = p.userData.life;
        if (p.userData.life <= 0) {
            scene.remove(p);
            particles.splice(i, 1);
        }
    }

    // --- Starfield twinkle ---
    stars.rotation.y += 0.0001;

    // --- Camera behavior ---
    if (gameState === 'title') {
        camera.position.x = Math.sin(Date.now() * 0.0008) * 1.5;
        camera.position.y = 12 + Math.sin(Date.now() * 0.0005) * 0.5;
    } else {
        camera.position.x = THREE.MathUtils.lerp(camera.position.x, shipGroup.position.x * 0.2, 0.03);
    }

    // Freeze visual: tint asteroids blue-white when frozen
    if (freezeActive) {
        asteroids.forEach(a => {
            a.material.emissive.setHex(0x88ccff);
            a.material.emissiveIntensity = 0.5;
        });
    } else {
        asteroids.forEach(a => {
            a.material.emissiveIntensity = 0.15;
        });
    }

    renderer.render(scene, camera);
}

// =============================================================
// HANDLE RESIZE
// =============================================================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start the render loop
animate();
</script>
</body>
</html>
