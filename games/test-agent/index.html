<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Test Agent Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; }

        #ui {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        #score {
            position: absolute; top: 20px; right: 20px;
            font-size: 2rem; color: #0ff; font-weight: 700;
            text-shadow: 0 0 10px #0ff;
        }
        #lives {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.5rem; color: #f0f; font-weight: 700;
            text-shadow: 0 0 10px #f0f;
        }
        #controls-hint {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem; color: #666;
        }

        .screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(10, 10, 26, 0.92); z-index: 20;
            pointer-events: auto;
        }
        .screen h1 {
            font-size: 3.5rem; color: #0ff;
            text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
            margin-bottom: 0.5rem;
        }
        .screen .sub {
            font-size: 1.2rem; color: #888; margin-bottom: 2rem;
        }
        .screen .start-text {
            font-size: 1.3rem; color: #f0f;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .screen .final-score {
            font-size: 2rem; color: #0ff; margin-bottom: 1.5rem;
        }
        .screen button {
            padding: 0.8rem 2.5rem; font-size: 1.1rem;
            border: 2px solid #0ff; background: transparent;
            color: #0ff; border-radius: 8px; cursor: pointer;
            transition: background 0.2s; pointer-events: auto;
        }
        .screen button:hover { background: rgba(0,255,255,0.15); }
        .credit {
            position: absolute; bottom: 20px;
            font-size: 0.8rem; color: #555;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="ui">
    <div id="score">0</div>
    <div id="lives"></div>
    <div id="controls-hint">WASD / Arrow Keys to move · SPACE to jump</div>
</div>

<div id="title-screen" class="screen">
    <h1>MY TEST AGENT GAME</h1>
    <p class="sub">A Medieval Fantasy Platformer</p>
    <p class="start-text">Press SPACE to Start</p>
    <p class="credit">by test-agent — NCWIT Indiana AIC Awards</p>
</div>

<div id="gameover-screen" class="screen hidden">
    <h1>GAME OVER</h1>
    <p class="final-score" id="final-score">Score: 0</p>
    <button id="restart-btn">Play Again</button>
    <p class="credit">by test-agent — NCWIT Indiana AIC Awards</p>
</div>

<script>
// =============================================================
// CONFIGURATION
// =============================================================
const CONFIG = {
    playerSpeed: 0.12,
    jumpForce: 0.28,
    gravity: 0.012,
    platformCount: 18,
    gemSpawnRate: 180,
    maxGems: 8,
    trailLifetime: 60,
    trailSpawnRate: 2,
    playerColor: 0x00ffff,
    trailColor1: 0xff4400,
    trailColor2: 0xff8800,
    bgColor: 0x080818,
    lives: 3,
};

// =============================================================
// THREE.JS SETUP
// =============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(CONFIG.bgColor);
scene.fog = new THREE.FogExp2(CONFIG.bgColor, 0.035);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 120);
camera.position.set(0, 18, 22);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// --- Lighting ---
scene.add(new THREE.AmbientLight(0x334466, 0.5));

const dirLight = new THREE.DirectionalLight(0xeeddcc, 0.7);
dirLight.position.set(8, 15, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const playerGlow = new THREE.PointLight(CONFIG.playerColor, 1.2, 12);
scene.add(playerGlow);

const fireGlow = new THREE.PointLight(0xff4400, 0.8, 10);
scene.add(fireGlow);

// =============================================================
// ARENA — Medieval floating platforms
// =============================================================
const platforms = [];
const platformGroup = new THREE.Group();
scene.add(platformGroup);

function createPlatform(x, y, z, w, d, type) {
    const h = 0.6;
    const colors = {
        stone: 0x556677,
        moss: 0x447744,
        royal: 0x6644aa,
    };
    const color = colors[type] || colors.stone;

    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshStandardMaterial({
        color, roughness: 0.85, metalness: 0.1,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData = { w, d, h, type };
    platformGroup.add(mesh);
    platforms.push(mesh);

    // Battlements on royal platforms
    if (type === 'royal') {
        for (let bx = -w/2 + 0.3; bx <= w/2 - 0.3; bx += 0.8) {
            for (let bz of [-d/2, d/2 - 0.2]) {
                const bGeo = new THREE.BoxGeometry(0.25, 0.4, 0.25);
                const bMat = new THREE.MeshStandardMaterial({ color: 0x775599, roughness: 0.9 });
                const battlement = new THREE.Mesh(bGeo, bMat);
                battlement.position.set(x + bx, y + h/2 + 0.2, z + bz);
                platformGroup.add(battlement);
            }
        }
    }
    return mesh;
}

// Build the arena — varied heights, spread across XZ plane
function buildArena() {
    // Clear old
    while (platformGroup.children.length) platformGroup.remove(platformGroup.children[0]);
    platforms.length = 0;

    // Central keep
    createPlatform(0, 0, 0, 5, 5, 'royal');

    // Surrounding platforms at various heights
    const layouts = [
        { x: -6, y: 1, z: -3, w: 3, d: 3, t: 'stone' },
        { x: 6, y: 0.5, z: -2, w: 3.5, d: 2.5, t: 'moss' },
        { x: -4, y: 2.5, z: 5, w: 2.5, d: 2.5, t: 'stone' },
        { x: 5, y: 1.8, z: 5, w: 3, d: 2, t: 'royal' },
        { x: -8, y: 3, z: -7, w: 2.5, d: 2.5, t: 'moss' },
        { x: 8, y: 2.2, z: -7, w: 3, d: 3, t: 'stone' },
        { x: 0, y: 3.5, z: -8, w: 3, d: 2.5, t: 'royal' },
        { x: -3, y: 1.5, z: -6, w: 2, d: 2, t: 'stone' },
        { x: 3, y: 2, z: 8, w: 2.5, d: 2.5, t: 'moss' },
        { x: -7, y: 2, z: 3, w: 2, d: 3, t: 'stone' },
        { x: 9, y: 3.2, z: 2, w: 2.5, d: 2.5, t: 'royal' },
        { x: 0, y: 4, z: 6, w: 2, d: 2, t: 'moss' },
        { x: -5, y: 3.5, z: -1, w: 2, d: 2, t: 'stone' },
        { x: 7, y: 1, z: -5, w: 2, d: 3, t: 'moss' },
        { x: -9, y: 1, z: -2, w: 2.5, d: 2, t: 'stone' },
        { x: 4, y: 4.5, z: -5, w: 2, d: 2, t: 'royal' },
        { x: -2, y: 5, z: -4, w: 2, d: 2, t: 'moss' },
    ];
    layouts.forEach(l => createPlatform(l.x, l.y, l.z, l.w, l.d, l.t));
}
buildArena();

// --- Decorative towers ---
function addTower(x, z, height) {
    const geo = new THREE.CylinderGeometry(0.4, 0.5, height, 8);
    const mat = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.9 });
    const tower = new THREE.Mesh(geo, mat);
    tower.position.set(x, height / 2 - 0.5, z);
    scene.add(tower);
    // Cone roof
    const roofGeo = new THREE.ConeGeometry(0.7, 1, 8);
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x8844aa, emissive: 0x220044, emissiveIntensity: 0.3 });
    const roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.set(x, height - 0.0, z);
    scene.add(roof);
}
addTower(-12, -10, 6);
addTower(12, -10, 5);
addTower(-12, 10, 7);
addTower(12, 10, 5.5);

// --- Starfield background ---
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 500; i++) {
    starVerts.push((Math.random() - 0.5) * 80, Math.random() * 40 + 5, (Math.random() - 0.5) * 80);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color: 0xaaaaff, size: 0.15 });
scene.add(new THREE.Points(starGeo, starMat));

// =============================================================
// PLAYER — Knight cube
// =============================================================
const playerGroup = new THREE.Group();
// Body
const bodyGeo = new THREE.BoxGeometry(0.7, 0.9, 0.7);
const bodyMat = new THREE.MeshStandardMaterial({
    color: CONFIG.playerColor, emissive: CONFIG.playerColor,
    emissiveIntensity: 0.25, roughness: 0.3, metalness: 0.7
});
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.45;
playerGroup.add(body);

// Helmet visor
const visorGeo = new THREE.BoxGeometry(0.5, 0.2, 0.1);
const visorMat = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 0.5 });
const visor = new THREE.Mesh(visorGeo, visorMat);
visor.position.set(0, 0.7, 0.35);
playerGroup.add(visor);

playerGroup.position.set(0, 0.3, 0);
scene.add(playerGroup);

// =============================================================
// GEMS — collectibles
// =============================================================
const gems = [];
function spawnGem() {
    if (gems.length >= CONFIG.maxGems) return;
    const plat = platforms[Math.floor(Math.random() * platforms.length)];
    const geo = new THREE.OctahedronGeometry(0.3, 0);
    const colors = [0xff00ff, 0xffff00, 0x00ff88, 0xff4400];
    const c = colors[Math.floor(Math.random() * colors.length)];
    const mat = new THREE.MeshStandardMaterial({
        color: c, emissive: c, emissiveIntensity: 0.5,
        roughness: 0.2, metalness: 0.8
    });
    const gem = new THREE.Mesh(geo, mat);
    gem.position.set(
        plat.position.x + (Math.random() - 0.5) * (plat.userData.w - 1),
        plat.position.y + plat.userData.h / 2 + 0.8,
        plat.position.z + (Math.random() - 0.5) * (plat.userData.d - 1)
    );
    gem.userData.value = Math.random() < 0.3 ? 5 : 1;
    gem.userData.baseY = gem.position.y;
    scene.add(gem);
    gems.push(gem);
}

// =============================================================
// TRAIL OF FIRE
// =============================================================
const trailParticles = [];
function spawnTrailParticle(x, y, z) {
    const size = 0.1 + Math.random() * 0.15;
    const geo = new THREE.BoxGeometry(size, size, size);
    const color = Math.random() > 0.5 ? CONFIG.trailColor1 : CONFIG.trailColor2;
    const mat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 1
    });
    const p = new THREE.Mesh(geo, mat);
    p.position.set(x + (Math.random() - 0.5) * 0.2, y, z + (Math.random() - 0.5) * 0.2);
    p.userData.velocity = new THREE.Vector3(
        (Math.random() - 0.5) * 0.02,
        0.02 + Math.random() * 0.03,
        (Math.random() - 0.5) * 0.02
    );
    p.userData.life = CONFIG.trailLifetime;
    scene.add(p);
    trailParticles.push(p);
}

// =============================================================
// GAME STATE
// =============================================================
let gameState = 'title';
let score = 0;
let lives = CONFIG.lives;
let frameCount = 0;
let playerVelY = 0;
let onGround = false;
let currentPlatform = null;

const keys = {};
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.code === 'Space' && gameState === 'title') startGame();
    if (e.code === 'Space' && gameState === 'playing') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
document.getElementById('restart-btn').addEventListener('click', startGame);

// =============================================================
// AUDIO
// =============================================================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, dur, type = 'square') {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function playJumpSound() { playSound(500, 0.15, 'sine'); }
function playGemSound() { playSound(880, 0.12, 'sine'); playSound(1100, 0.15, 'sine'); }
function playFallSound() { playSound(200, 0.4, 'sawtooth'); }

// =============================================================
// GAME FUNCTIONS
// =============================================================
function startGame() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    score = 0;
    lives = CONFIG.lives;
    frameCount = 0;
    playerVelY = 0;
    onGround = false;
    playerGroup.position.set(0, 0.6, 0);

    gems.forEach(g => scene.remove(g));
    gems.length = 0;
    trailParticles.forEach(p => scene.remove(p));
    trailParticles.length = 0;

    updateUI();
    document.getElementById('title-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.add('hidden');
    gameState = 'playing';
}

function updateUI() {
    document.getElementById('score').textContent = score;
    let heartsStr = '';
    for (let i = 0; i < lives; i++) heartsStr += '♥ ';
    document.getElementById('lives').textContent = heartsStr;
}

function respawnPlayer() {
    playerGroup.position.set(0, 2, 0);
    playerVelY = 0;
    onGround = false;
}

function gameOver() {
    gameState = 'gameover';
    document.getElementById('final-score').textContent = `Score: ${score}`;
    document.getElementById('gameover-screen').classList.remove('hidden');
}

// =============================================================
// PLATFORM COLLISION
// =============================================================
function checkPlatformCollision() {
    const px = playerGroup.position.x;
    const py = playerGroup.position.y;
    const pz = playerGroup.position.z;
    const pw = 0.35; // player half-width

    onGround = false;
    currentPlatform = null;

    for (const plat of platforms) {
        const top = plat.position.y + plat.userData.h / 2;
        const hw = plat.userData.w / 2;
        const hd = plat.userData.d / 2;

        // Check if player is above this platform and within XZ bounds
        if (px + pw > plat.position.x - hw && px - pw < plat.position.x + hw &&
            pz + pw > plat.position.z - hd && pz - pw < plat.position.z + hd) {
            // Landing on top
            if (playerVelY <= 0 && py >= top - 0.1 && py <= top + 0.5) {
                playerGroup.position.y = top;
                playerVelY = 0;
                onGround = true;
                currentPlatform = plat;
                return;
            }
        }
    }
}

// =============================================================
// GAME LOOP
// =============================================================
function animate() {
    requestAnimationFrame(animate);

    if (gameState === 'playing') {
        frameCount++;

        // --- Player movement (multi-directional) ---
        let moveX = 0, moveZ = 0;
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) moveX = -1;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) moveX = 1;
        if (keys['ArrowUp'] || keys['w'] || keys['W']) moveZ = -1;
        if (keys['ArrowDown'] || keys['s'] || keys['S']) moveZ = 1;

        // Normalize diagonal movement
        if (moveX !== 0 && moveZ !== 0) {
            moveX *= 0.707;
            moveZ *= 0.707;
        }

        playerGroup.position.x += moveX * CONFIG.playerSpeed;
        playerGroup.position.z += moveZ * CONFIG.playerSpeed;

        // Face movement direction
        if (moveX !== 0 || moveZ !== 0) {
            playerGroup.rotation.y = Math.atan2(moveX, moveZ);
        }

        // --- Jump ---
        if ((keys[' '] || keys['Space']) && onGround) {
            playerVelY = CONFIG.jumpForce;
            onGround = false;
            playJumpSound();
        }

        // --- Gravity ---
        playerVelY -= CONFIG.gravity;
        playerGroup.position.y += playerVelY;

        // --- Platform collision ---
        checkPlatformCollision();

        // --- Fall off the world ---
        if (playerGroup.position.y < -8) {
            lives--;
            playFallSound();
            updateUI();
            if (lives <= 0) {
                gameOver();
            } else {
                respawnPlayer();
            }
        }

        // --- Trail of fire ---
        if (frameCount % CONFIG.trailSpawnRate === 0 && (moveX !== 0 || moveZ !== 0 || !onGround)) {
            spawnTrailParticle(
                playerGroup.position.x,
                playerGroup.position.y - 0.2,
                playerGroup.position.z
            );
        }

        // --- Spawn gems ---
        if (frameCount % CONFIG.gemSpawnRate === 0) spawnGem();

        // --- Gem collection & animation ---
        for (let i = gems.length - 1; i >= 0; i--) {
            const gem = gems[i];
            gem.rotation.y += 0.04;
            gem.position.y = gem.userData.baseY + Math.sin(frameCount * 0.05 + i) * 0.2;

            const dx = playerGroup.position.x - gem.position.x;
            const dy = playerGroup.position.y - gem.position.y;
            const dz = playerGroup.position.z - gem.position.z;
            if (Math.sqrt(dx*dx + dy*dy + dz*dz) < 0.9) {
                score += gem.userData.value;
                playGemSound();
                scene.remove(gem);
                gems.splice(i, 1);
                updateUI();
            }
        }

        // --- Update lights ---
        playerGlow.position.copy(playerGroup.position);
        playerGlow.position.y += 1;
        fireGlow.position.set(
            playerGroup.position.x,
            playerGroup.position.y - 0.3,
            playerGroup.position.z
        );
    }

    // --- Trail particle update (always) ---
    for (let i = trailParticles.length - 1; i >= 0; i--) {
        const p = trailParticles[i];
        p.position.add(p.userData.velocity);
        p.userData.life--;
        p.material.opacity = p.userData.life / CONFIG.trailLifetime;
        p.scale.multiplyScalar(0.98);
        if (p.userData.life <= 0) {
            scene.remove(p);
            trailParticles.splice(i, 1);
        }
    }

    // --- Camera follow ---
    if (gameState === 'playing') {
        camera.position.x += (playerGroup.position.x * 0.5 - camera.position.x) * 0.04;
        camera.position.z += (playerGroup.position.z + 22 - camera.position.z) * 0.04;
        camera.position.y += (playerGroup.position.y + 14 - camera.position.y) * 0.04;
        camera.lookAt(playerGroup.position.x * 0.3, playerGroup.position.y, playerGroup.position.z);
    } else if (gameState === 'title') {
        camera.position.x = Math.sin(Date.now() * 0.0005) * 5;
        camera.position.z = Math.cos(Date.now() * 0.0005) * 5 + 20;
        camera.lookAt(0, 2, 0);
    }

    renderer.render(scene, camera);
}

// =============================================================
// RESIZE
// =============================================================
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

animate();
</script>
</body>
</html>
